      description: >-
        Requiere permiso activities.read.
      tags: [Activities]
      summary: 'Consultar - activities/range'
      responses:
        '200':
          description: Operacion exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardCoreEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /activities/{uid}:
    delete:
      description: >-
        Requiere permiso activities.delete.
      tags: [Activities]
      summary: 'Eliminar - activities/{id}'
      parameters:
        - in: path
          name: uid
          required: true
          description: 'Parametro de ruta uid.'
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Operacion exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
    get:
      tags: [Activities]
      summary: 'Consultar - activities/{id}'
      parameters:
        - in: path
          name: uid
          required: true
          description: 'Parametro de ruta uid.'
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Operacion exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
    put:
      tags: [Activities]
      summary: 'Actualizar - activities/{id}'
      parameters:
        - in: path
          name: uid
          required: true
          description: 'Parametro de ruta uid.'
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericRequest'
      responses:
        '200':
          description: Operacion exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /commissions/assignments:
    get:
      description: >-
        Requiere permiso commissions.read.
      tags: [Commissions]
      summary: 'Consultar - commissions/assignments'
      responses:
        '200':
          description: Operacion exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
    post:
      tags: [Commissions]
      summary: 'Crear o ejecutar - commissions/assignments'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericRequest'
      responses:
        '201':
          description: Operacion exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /commissions/assignments/{uid}:
    put:
      description: >-
        Requiere permiso commissions.manage.
      tags: [Commissions]
      summary: 'Actualizar - commissions/assignments/{id}'
      parameters:
        - in: path
          name: uid
          required: true
          description: 'Parametro de ruta uid.'
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericRequest'
      responses:
        '200':
          description: Operacion exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /commissions/dashboard/{userUid}:
    get:
      description: >-
        Requiere permiso commissions.read.
      tags: [Commissions]
      summary: 'Consultar dashboard - commissions/dashboard/{id}'
      parameters:
        - in: path
          name: userUid
          required: true
          description: 'Parametro de ruta userUid.'
          schema:
            type: string
            format: uuid
      responses:
        '200':
