      summary: Logs del tenant
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum
  parameters:
    UidPath:
      in: path
      name: uid
      required: true
      schema:
        type: string
        format: uuid
    RoleUidPath:
      in: path
      name: roleUid
      required: true
      schema:
        type: string
        format: uuid
    PermissionUidPath:
      in: path
      name: permissionUid
      required: true
      schema:
        type: string
        format: uuid
    UserUidPath:
      in: path
      name: userUid
      required: true
      schema:
        type: string
        format: uuid
    InvoiceUidPath:
      in: path
      name: invoiceUid
      required: true
      schema:
        type: string
        format: uuid
    ItemUidPath:
      in: path
      name: itemUid
      required: true
      schema:
        type: string
        format: uuid
    ReservationUidPath:
      in: path
      name: reservationUid
      required: true
      schema:
        type: string
        format: uuid
    TypePath:
      in: path
      name: type
      required: true
      schema:
        type: string
    SourceTypePath:
      in: path
      name: sourceType
      required: true
      schema:
        type: string
    SourceUidPath:
      in: path
      name: sourceUid
      required: true
      schema:
        type: string
  responses:
    GenericSuccess:
      description: Respuesta envelope de la API
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GenericSuccess'
  schemas:
    GenericSuccess:
      type: object
      properties:
        success: { type: boolean, example: true }
        message: { type: string, nullable: true }
        data:
          nullable: true
        errors:
          nullable: true
    LoginResponse:
      allOf:
        - $ref: '#/components/schemas/GenericSuccess'
        - type: object
          properties:
            data:
              type: object
              properties:
                requires_two_factor_setup: { type: boolean }
                token: { type: string }
                user:
                  type: object
                  properties:
                    uid: { type: string, format: uuid }
                    name: { type: string }
                    email: { type: string, format: email }
                    tenant_uid: { type: string, format: uuid }
                    two_factor_enabled: { type: boolean }
                    locked_until: { type: string, nullable: true }
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }
        two_factor_code: { type: string, nullable: true }
        recovery_code: { type: string, nullable: true }
    PlanRequest:
      type: object
      properties:
        name: { type: string }
        price: { type: number, format: float }
        max_accounts: { type: integer }
        max_contacts: { type: integer }
        max_entities: { type: integer }
        active: { type: boolean }
    RoleRequest:
      type: object
      required: [name, key]
      properties:
        name: { type: string }
        key: { type: string }
        description: { type: string }
        permission_uids:
          type: array
          items: { type: string, format: uuid }
    OwnerAssignmentRequest:
      type: object
      required: [owner_user_uid]
      properties:
        owner_user_uid: { type: string, format: uuid }
    AccountRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        document: { type: string }
        email: { type: string, format: email }
        industry: { type: string }
        website: { type: string }
        phone: { type: string }
        address: { type: string }
    ContactRequest:
      type: object
      required: [first_name]
      properties:
        first_name: { type: string }
        last_name: { type: string }
        email: { type: string, format: email }
        phone: { type: string }
        position: { type: string }
        account_uid: { type: string, format: uuid }
    RelationRequest:
      type: object
      required: [type, from_type, from_uid, to_type, to_uid]
      properties:
        type: { type: string }
        from_type: { type: string }
        from_uid: { type: string, format: uuid }
        to_type: { type: string }
        to_uid: { type: string, format: uuid }
        metadata: { type: object }
    CrmEntityRequest:
      type: object
      required: [type, name]
      properties:
        type: { type: string }
        name: { type: string }
        profile_data: { type: object }
    TagRequest:
      type: object
      required: [name, key]
      properties:
        name: { type: string }
        key: { type: string }
        color: { type: string }
    TagAssignmentRequest:
      type: object
      required: [tag_uid, entity_type, entity_uid]
      properties:
        tag_uid: { type: string, format: uuid }
        entity_type: { type: string }
        entity_uid: { type: string, format: uuid }
    TaskRequest:
      type: object
      required: [title]
      properties:
        title: { type: string }
        description: { type: string }
        status: { type: string }
        priority: { type: string }
        due_date: { type: string, format: date }
        taskable_type: { type: string }
        taskable_uid: { type: string, format: uuid }
    InteractionRequest:
      type: object
      required: [entity_type, entity_uid, subject]
      properties:
        entity_type: { type: string }
        entity_uid: { type: string, format: uuid }
        subject: { type: string }
        body: { type: string }
        occurred_at: { type: string, format: date-time }
        metadata: { type: object }
    ActivityRequest:
      type: object
      required: [title, type, scheduled_at]
      properties:
        type: { type: string }
        title: { type: string }
        description: { type: string }
        status: { type: string }
        scheduled_at: { type: string, format: date-time }
        activityable_type: { type: string }
        activityable_uid: { type: string, format: uuid }
    InventoryAdjustRequest:
      type: object
      required: [product_uid, warehouse_uid, quantity]
      properties:
        product_uid: { type: string, format: uuid }
        warehouse_uid: { type: string, format: uuid }
        quantity: { type: integer }
        movement_type: { type: string, enum: [entry, exit, adjustment] }
        comment: { type: string }
        reference_type: { type: string }
        reference_uid: { type: string }
    InventoryReservationRequest:
      type: object
      required: [product_uid, warehouse_uid, quantity, source_type, source_uid]
      properties:
        product_uid: { type: string, format: uuid }
        warehouse_uid: { type: string, format: uuid }
        quantity: { type: integer }
        source_type: { type: string }
        source_uid: { type: string }
        comment: { type: string }
    InventoryTransferRequest:
      type: object
      required: [product_uid, origin_warehouse_uid, destination_warehouse_uid, quantity]
      properties:
        product_uid: { type: string, format: uuid }
        origin_warehouse_uid: { type: string, format: uuid }
        destination_warehouse_uid: { type: string, format: uuid }
        quantity: { type: integer }
        comment: { type: string }
    NameColorRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        color: { type: string }
        description: { type: string }
    InventoryProductRequest:
      type: object
      required: [sku, name]
      properties:
        sku: { type: string }
        name: { type: string }
        category_uid: { type: string, format: uuid }
        cost_price: { type: number, format: float }
        sale_price: { type: number, format: float }
        min_stock: { type: integer }
        unit: { type: string }
        active: { type: boolean }
    WarehouseRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        code: { type: string }
        location: { type: string }
        is_default: { type: boolean }
    QuoteRequest:
      type: object
      properties:
        quote_number: { type: string }
        title: { type: string }
        entity_type: { type: string, example: account }
        entity_uid: { type: string, format: uuid }
        price_book_uid: { type: string, format: uuid }
        currency: { type: string }
        exchange_rate: { type: number, format: float }
        local_currency: { type: string }
        notes: { type: string }
    QuoteItemRequest:
      type: object
      required: [description, quantity]
      properties:
        product_uid: { type: string, format: uuid }
        warehouse_uid: { type: string, format: uuid }
        description: { type: string }
        quantity: { type: integer }
        unit_price: { type: number, format: float }
        discount_percent: { type: number, format: float }
        discount_amount: { type: number, format: float }
    PriceBookRequest:
      type: object
      required: [name, type]
      properties:
        name: { type: string }
        type: { type: string, enum: [public, distributor, bid] }
        currency: { type: string }
        active: { type: boolean }
        items:
          type: array
          items:
            type: object
            properties:
              product_uid: { type: string, format: uuid }
              price: { type: number, format: float }
              min_margin_percent: { type: number, format: float }
    CommissionPlanRequest:
      type: object
      required: [name, type, base_percent]
      properties:
        name: { type: string }
        type: { type: string, enum: [sale, margin, target] }
        base_percent: { type: number, format: float }
        tiers_json:
          type: array
          items: { type: object }
        starts_at: { type: string, format: date }
        ends_at: { type: string, format: date }
        active: { type: boolean }
    CommissionAssignmentRequest:
      type: object
      required: [user_uid, commission_plan_uid, starts_at]
      properties:
        user_uid: { type: string, format: uuid }
        commission_plan_uid: { type: string, format: uuid }
        starts_at: { type: string, format: date }
        ends_at: { type: string, format: date }
        active: { type: boolean }
    CommissionTargetRequest:
      type: object
      required: [user_uid, period, target_amount]
      properties:
        user_uid: { type: string, format: uuid }
        period: { type: string, example: 2026-04 }
        target_amount: { type: number, format: float }
    CommissionRuleRequest:
      type: object
      properties:
        name: { type: string }
        type: { type: string }
        percent: { type: number, format: float }
        product_uid: { type: string, format: uuid }
        customer_type: { type: string }
        active: { type: boolean }
    CommissionFinancialRecordRequest:
      type: object
      properties:
        financial_record_uid: { type: string, format: uuid }
        seller_user_uid: { type: string, format: uuid }
    CommissionSimulationRequest:
      type: object
      required: [user_uid]
      properties:
        user_uid: { type: string, format: uuid }
        sale_amount: { type: number, format: float }
        margin_amount: { type: number, format: float }
        period: { type: string }
    CommissionRunRequest:
      type: object
      required: [user_uid, period_start, period_end]
      properties:
        user_uid: { type: string, format: uuid }
        period_start: { type: string, format: date }
        period_end: { type: string, format: date }
    SupplierRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        email: { type: string, format: email }
        phone: { type: string }
        tax_id: { type: string }
        address: { type: string }
    ExpenseRequest:
      type: object
      required: [expense_category_uid, title, amount, expense_date]
      properties:
        expense_category_uid: { type: string, format: uuid }
        supplier_uid: { type: string, format: uuid }
        entity_type: { type: string }
        entity_uid: { type: string, format: uuid }
        cost_center_uid: { type: string, format: uuid }
        title: { type: string }
        description: { type: string }
        amount: { type: number, format: float }
        currency: { type: string }
        expense_date: { type: string, format: date }
        status: { type: string, enum: [draft, submitted, approved, paid] }
    PurchaseOrderRequest:
      type: object
      required: [supplier_uid, purchase_number, items]
      properties:
        supplier_uid: { type: string, format: uuid }
        entity_type: { type: string }
        entity_uid: { type: string, format: uuid }
        cost_center_uid: { type: string, format: uuid }
        purchase_number: { type: string }
        currency: { type: string }
        ordered_at: { type: string, format: date }
        expected_at: { type: string, format: date }
        due_date: { type: string, format: date }
        notes: { type: string }
        items:
          type: array
          items:
            type: object
            required: [description, quantity, unit_cost]
            properties:
              product_uid: { type: string, format: uuid }
              warehouse_uid: { type: string, format: uuid }
              description: { type: string }
              quantity: { type: integer }
              unit_cost: { type: number, format: float }
    PurchaseReceiptRequest:
      type: object
      required: [items]
      properties:
        receipt_date: { type: string, format: date }
        reference: { type: string }
        comment: { type: string }
        items:
          type: array
          items:
            type: object
            required: [item_uid, received_quantity]
            properties:
              item_uid: { type: string, format: uuid }
              received_quantity: { type: integer }
    PurchasePaymentRequest:
      type: object
      required: [amount, payment_date]
      properties:
        amount: { type: number, format: float }
        payment_date: { type: string, format: date }
        method: { type: string }
        reference: { type: string }
    OpportunityStageRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        color: { type: string }
        position: { type: integer }
        is_closed: { type: boolean }
        probability: { type: number, format: float }
    OpportunityRequest:
      type: object
      required: [title]
      properties:
        title: { type: string }
        entity_type: { type: string }
        entity_uid: { type: string, format: uuid }
        contact_uid: { type: string, format: uuid }
        stage_uid: { type: string, format: uuid }
        amount: { type: number, format: float }
        expected_close_date: { type: string, format: date }
        notes: { type: string }
    InvoiceRequest:
      type: object
      properties:
        quotation_uid: { type: string, format: uuid }
        invoice_number: { type: string }
        currency: { type: string }
        exchange_rate: { type: number, format: float }
        due_date: { type: string, format: date }
    PaymentRequest:
      type: object
      required: [invoice_uid, amount, payment_date]
      properties:
        invoice_uid: { type: string, format: uuid }
        amount: { type: number, format: float }
        payment_date: { type: string, format: date }
        method: { type: string }
        external_reference: { type: string }
    CreditProfileRequest:
      type: object
      properties:
        credit_limit: { type: number, format: float }
        max_days_overdue: { type: integer }
        auto_block: { type: boolean }
        status: { type: string, enum: [ok, blocked] }
    CurrencyRateRequest:
      type: object
      required: [from_currency, to_currency, rate]
      properties:
        from_currency: { type: string }
        to_currency: { type: string }
        rate: { type: number, format: float }
        date: { type: string, format: date }
    CurrencyConvertRequest:
      type: object
      required: [amount, from_currency, to_currency]
      properties:
        amount: { type: number, format: float }
        from_currency: { type: string }
        to_currency: { type: string }
        date: { type: string, format: date }
    SearchRequest:
      type: object
      properties:
        entity_types:
          type: array
          items: { type: string }
        text: { type: string }
        tag_uids:
          type: array
          items: { type: string, format: uuid }
        date_from: { type: string, format: date }
        date_to: { type: string, format: date }
        page: { type: integer }
        per_page: { type: integer }
        sort_by: { type: string }
        sort_direction: { type: string }
        custom_field_filters:
          type: array
          items: { type: object }
    CustomFieldRequest:
      type: object
      required: [entity_type, name, key, type]
      properties:
