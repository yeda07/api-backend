openapi: 3.0.3
info:
  title: API Backend CRM
  version: 2.0.0
  description: >-
    Documentacion OpenAPI generada desde las rutas reales del backend Laravel multi-tenant.
servers:
  - url: /api
security:
  - bearerAuth: []
tags:
  - name: Accounts
  - name: Activities
  - name: Auth
  - name: Commissions
  - name: CompetitiveIntelligence
  - name: Contacts
  - name: CrmEntities
  - name: Currency
  - name: CustomFields
  - name: Dashboard
  - name: Documents
  - name: Expenses
  - name: Finance
  - name: Interactions
  - name: Inventory
  - name: Logs
  - name: Metrics
  - name: Admin
  - name: Opportunities
  - name: Partners
  - name: Plans
  - name: PriceBooks
  - name: Products
  - name: Purchases
  - name: Quotations
  - name: RBAC
  - name: Relations
  - name: Search
  - name: Reports
  - name: Settings
  - name: Tags
  - name: Tasks
  - name: Teams
paths:
  /2fa/confirm:
    post:
      tags: [Auth]
      summary: 'Confirmar 2FA - 2fa/confirm'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CurrencyConvertRequest'
      responses:
        '200':
          description: Operacion exitosa
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CurrencyConversion'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /2fa/recovery-codes/regenerate:
    post:
      tags: [Auth]
      summary: 'Regenerar codigos 2FA - 2fa/recovery-codes/regenerate'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericRequest'
      responses:
        '200':
          description: Operacion exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /2fa/setup:
    get:
      tags: [Auth]
      summary: 'Configurar 2FA - 2fa/setup'
      responses:
        '200':
          description: Operacion exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanArrayEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /admin/dashboard:
    get:
      tags: [Admin]
      summary: Dashboard administrativo
      description: Requiere acceso de plataforma y permiso `plans.manage`.
      parameters:
        - in: query
          name: recent_page
          schema:
            type: integer
            minimum: 1
        - in: query
          name: recent_per_page
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        '200':
          description: Operacion exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminDashboardEnvelope'
  /admin/tenants:
    get:
      tags: [Admin]
      summary: Listar tenants
      description: Requiere acceso de plataforma y permiso `plans.manage`.
      parameters:
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: plan_uid
          schema:
            type: string
            format: uuid
        - in: query
          name: estado
          schema:
            type: string
            enum: [ACTIVO, TRIAL, VENCIDO, SUSPENDIDO, INACTIVO]
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
        - in: query
          name: per_page
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - in: query
          name: sort_by
          schema:
            type: string
            enum: [nombre, mrr, totalUsuarios, creadoEn, ultimoAcceso]
        - in: query
          name: sort_dir
          schema:
            type: string
            enum: [asc, desc]
      responses:
        '200':
          description: Operacion exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminTenantListEnvelope'
    post:
      tags: [Admin]
      summary: Crear tenant
      description: Requiere acceso de plataforma y permiso `plans.manage`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminTenantRequest'
      responses:
        '201':
          description: Operacion exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminTenantEnvelope'
  /admin/tenants/{uid}:
    get:
      tags: [Admin]
      summary: Ver tenant
      description: Requiere acceso de plataforma y permiso `plans.manage`.
      parameters:
        - $ref: '#/components/parameters/UidPath'
      responses:
        '200':
          description: Operacion exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminTenantEnvelope'
    put:
      tags: [Admin]
      summary: Actualizar tenant
      description: Requiere acceso de plataforma y permiso `plans.manage`.
      parameters:
        - $ref: '#/components/parameters/UidPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminTenantRequest'
      responses:
        '200':
          description: Operacion exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminTenantEnvelope'
  /admin/tenants/{uid}/activate:
    post:
      tags: [Admin]
      summary: Activar tenant
      description: Requiere acceso de plataforma y permiso `plans.manage`.
      parameters:
        - $ref: '#/components/parameters/UidPath'
      responses:
        '200':
          description: Operacion exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminTenantEnvelope'
  /admin/tenants/{uid}/suspend:
    post:
      tags: [Admin]
      summary: Suspender tenant
      description: Requiere acceso de plataforma y permiso `plans.manage`.
      parameters:
        - $ref: '#/components/parameters/UidPath'
      responses:
        '200':
          description: Operacion exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminTenantEnvelope'
  /admin/tenants/{uid}/users:
    get:
      tags: [Admin]
      summary: Listar usuarios de tenant
      description: Requiere acceso de plataforma y permiso `admin.tenants.manage`.
      parameters:
        - $ref: '#/components/parameters/UidPath'
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
        - in: query
          name: per_page
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Operacion exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminTenantUserListEnvelope'
    post:
      tags: [Admin]
      summary: Crear usuario de tenant
      description: Requiere acceso de plataforma y permiso `admin.tenants.manage`.
      parameters:
        - $ref: '#/components/parameters/UidPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminTenantUserRequest'
      responses:
        '201':
          description: Operacion exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminTenantUserCreateEnvelope'
  /admin/billing:
    get:
      tags: [Admin]
      summary: Listar facturacion administrativa
      description: Requiere acceso de plataforma y permiso `plans.manage`.
      parameters:
        - in: query
          name: tenant_uid
          schema:
            type: string
            format: uuid
        - in: query
          name: estado
          schema:
            type: string
            enum: [PAGADA, PENDIENTE, VENCIDA, CANCELADA]
        - in: query
          name: from
          schema:
            type: string
            format: date
        - in: query
          name: to
          schema:
            type: string
            format: date
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
        - in: query
          name: per_page
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Operacion exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminBillingListEnvelope'
  /admin/billing/summary:
    get:
      tags: [Admin]
      summary: Resumen de facturacion administrativa
      description: Requiere acceso de plataforma y permiso `plans.manage`.
      responses:
        '200':
          description: Operacion exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminBillingSummaryEnvelope'
  /admin/billing/{uid}/mark-paid:
    post:
      tags: [Admin]
      summary: Marcar factura como pagada
      description: Requiere acceso de plataforma y permiso `plans.manage`.
      parameters:
        - $ref: '#/components/parameters/UidPath'
      responses:
        '200':
          description: Operacion exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminBillingInvoiceEnvelope'
  /admin/billing/mark-paid-bulk:
    post:
      tags: [Admin]
      summary: Marcar facturas como pagadas en lote
      description: Requiere acceso de plataforma y permiso `plans.manage`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminBillingBulkRequest'
      responses:
        '200':
          description: Operacion exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminBillingInvoiceArrayEnvelope'
  /admin/telemetry/summary:
    get:
      tags: [Admin]
      summary: Resumen global de telemetria
      description: Requiere acceso de plataforma y permiso `plans.manage`.
      responses:
        '200':
          description: Operacion exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminTelemetrySummaryEnvelope'
  /admin/telemetry/stats:
    get:
      tags: [Admin]
      summary: Stats cortas de telemetria
      description: Requiere acceso de plataforma y permiso `plans.manage`.
      responses:
        '200':
          description: Operacion exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminTelemetryStatsEnvelope'
  /admin/telemetry/logs:
    get:
      tags: [Admin]
      summary: Listar logs de plataforma
      description: Requiere acceso de plataforma y permiso `plans.manage`.
      parameters:
        - in: query
          name: tenant_uid
          schema:
            type: string
            format: uuid
        - in: query
          name: nivel
          schema:
            type: string
            enum: [ERROR, WARN, INFO]
        - in: query
          name: from
          schema:
            type: string
            format: date
        - in: query
          name: to
          schema:
            type: string
            format: date
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
        - in: query
          name: per_page
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Operacion exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminTelemetryLogListEnvelope'
  /admin/telemetry/alerts:
    get:
      tags: [Admin]
      summary: Listar alertas administrativas
      description: Requiere acceso de plataforma y permiso `plans.manage`.
      responses:
        '200':
          description: Operacion exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminAlertArrayEnvelope'
    post:
      tags: [Admin]
      summary: Crear alerta administrativa
      description: Requiere acceso de plataforma y permiso `plans.manage`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminAlertRuleRequest'
      responses:
        '201':
          description: Operacion exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminAlertEnvelope'
  /admin/telemetry/alerts/{uid}:
    put:
      tags: [Admin]
      summary: Actualizar alerta administrativa
      description: Requiere acceso de plataforma y permiso `plans.manage`.
      parameters:
        - $ref: '#/components/parameters/UidPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminAlertRuleRequest'
      responses:
        '200':
          description: Operacion exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminAlertEnvelope'
  /admin/telemetry/alerts/{uid}/toggle:
    post:
      tags: [Admin]
      summary: Alternar alerta administrativa
      description: Requiere acceso de plataforma y permiso `plans.manage`.
      parameters:
        - $ref: '#/components/parameters/UidPath'
      responses:
        '200':
          description: Operacion exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminAlertEnvelope'
  /accounts:
    get:
      description: >-
        Requiere permiso accounts.read.
      tags: [Accounts]
      summary: 'Listar - accounts'
      responses:
        '200':
          description: Operacion exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
    post:
      tags: [Accounts]
      summary: 'Crear - accounts'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountRequest'
      responses:
        '201':
          description: Operacion exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /accounts/{uid}:
    delete:
      description: >-
        Requiere permiso accounts.delete.
      tags: [Accounts]
      summary: 'Eliminar - accounts/{id}'
      parameters:
        - in: path
          name: uid
          required: true
          description: 'Parametro de ruta uid.'
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Operacion exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
    get:
      tags: [Accounts]
      summary: 'Consultar - accounts/{id}'
      parameters:
        - in: path
          name: uid
          required: true
          description: 'Parametro de ruta uid.'
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Operacion exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
    put:
      tags: [Accounts]
      summary: 'Actualizar - accounts/{id}'
      parameters:
        - in: path
          name: uid
          required: true
          description: 'Parametro de ruta uid.'
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericRequest'
      responses:
        '200':
          description: Operacion exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /accounts/{uid}/owner:
    post:
      description: >-
        Requiere permiso accounts.update.
      tags: [Accounts]
      summary: 'Asignar owner - accounts/{id}/owner'
      parameters:
        - in: path
          name: uid
          required: true
          description: 'Parametro de ruta uid.'
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericRequest'
      responses:
        '200':
          description: Operacion exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /accounts/{uid}/products:
    get:
      description: >-
        Requiere permiso products.read.
      tags: [Accounts]
      summary: 'Consultar - accounts/{id}/products'
      parameters:
        - in: path
          name: uid
          required: true
          description: 'Parametro de ruta uid.'
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Operacion exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
    post:
      tags: [Accounts]
      summary: 'Crear o ejecutar - accounts/{id}/products'
      parameters:
        - in: path
          name: uid
          required: true
          description: 'Parametro de ruta uid.'
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericRequest'
      responses:
        '200':
          description: Operacion exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /activities:
    get:
      description: >-
        Requiere permiso activities.read.
      tags: [Activities]
      summary: 'Listar - activities'
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
        - in: query
          name: per_page
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - in: query
          name: paginate
          schema:
            type: boolean
          description: Enviar false para retornar un array sin metadata de paginacion.
        - in: query
          name: scope
          schema:
            type: string
            enum: [tenant]
          description: Enviar tenant para ignorar Row-Level Security y retornar actividades del tenant actual.
      responses:
        '200':
          description: Operacion exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
    post:
      tags: [Activities]
      summary: 'Crear - activities'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericRequest'
      responses:
        '201':
          description: Operacion exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /activities/range:
