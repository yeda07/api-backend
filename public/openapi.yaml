components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum
  responses:
    Unauthorized:
      description: Token invalido o ausente.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    ValidationError:
      description: Error de validacion.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    GenericRequest:
      type: object
      additionalProperties: true
      description: Payload generico. Revise las reglas del endpoint en el backend.
    PartnerRequest:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
          example: Aliado Norte SAS
        type:
          type: string
          enum: [distributor, reseller, ally]
          example: reseller
        status:
          type: string
          enum: [active, inactive]
          example: active
        account_uid:
          type: string
          format: uuid
        contact_info:
          type: object
          additionalProperties: true
          example:
            email: comercial@aliadonorte.com
            phone: "+57 3000000000"
    PartnerOpportunityRequest:
      type: object
      required: [partner_uid, account_uid, title]
      properties:
        partner_uid:
          type: string
          format: uuid
        account_uid:
          type: string
          format: uuid
        title:
          type: string
          example: Licitacion alcaldia zona norte
        status:
          type: string
          enum: [open, won, lost]
          example: open
        conflict_scope:
          type: string
          enum: [global, partner]
          example: global
        amount:
          type: number
          format: float
          example: 150000000
        currency:
          type: string
          example: COP
        description:
          type: string
    PartnerOpportunityValidateRequest:
      type: object
      required: [partner_uid, account_uid]
      properties:
        partner_uid:
          type: string
          format: uuid
        account_uid:
          type: string
          format: uuid
        conflict_scope:
          type: string
          enum: [global, partner]
          example: global
        current_opportunity_uid:
          type: string
          format: uuid
    PartnerOpportunityCloseRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [won, lost]
          example: won
    PartnerResourceRequest:
      type: object
      required: [title, type, file]
      properties:
        title:
          type: string
          example: Presentacion comercial sector publico
        type:
          type: string
          enum: [sales, training]
          example: sales
        partner_uids:
          type: array
          items:
            type: string
            format: uuid
        is_active:
          type: boolean
          example: true
        file:
          type: string
          format: binary
    PartnerResourceAssignRequest:
      type: object
      required: [partner_uids]
      properties:
        partner_uids:
          type: array
          items:
            type: string
            format: uuid
    SuccessEnvelope:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          nullable: true
          example: null
        data:
          nullable: true
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items:
                type: object
                additionalProperties: true
            - type: string
            - type: number
            - type: boolean
        errors:
          nullable: true
          example: null
        meta:
          $ref: '#/components/schemas/MetaEnvelope'
    ErrorEnvelope:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Validation error
        data:
          nullable: true
          example: null
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
    MetaEnvelope:
      type: object
      nullable: true
      properties:
        pagination:
          $ref: '#/components/schemas/PaginationMeta'
    PaginationMeta:
      type: object
      nullable: true
      properties:
        current_page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        last_page:
          type: integer


