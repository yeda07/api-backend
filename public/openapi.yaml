openapi: 3.0.3
info:
  title: API Backend CRM
  version: 1.1.0
  description: Documentacion OpenAPI del backend Laravel multi-tenant.
servers:
  - url: /api
security:
  - bearerAuth: []
tags:
  - name: Auth
  - name: RBAC
  - name: Plans
  - name: Accounts
  - name: Contacts
  - name: Relations
  - name: CrmEntities
  - name: Tags
  - name: Tasks
  - name: Interactions
  - name: Activities
  - name: Documents
  - name: Inventory
  - name: Quotations
  - name: PriceBooks
  - name: Commissions
  - name: Expenses
  - name: Purchases
  - name: Opportunities
  - name: Finance
  - name: Currency
  - name: Search
  - name: Dashboard
  - name: CustomFields
  - name: Metrics
  - name: Logs
paths:
  /login:
    post:
      tags: [Auth]
      security: []
      summary: Iniciar sesion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login exitoso o respuesta de setup 2FA
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
  /forgot-password:
    post:
      tags: [Auth]
      security: []
      summary: Solicitar recuperacion de contrasena
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
  /reset-password:
    post:
      tags: [Auth]
      security: []
      summary: Restablecer contrasena
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, token, password, password_confirmation]
              properties:
                email: { type: string, format: email }
                token: { type: string }
                password: { type: string }
                password_confirmation: { type: string }
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
  /logout:
    post:
      tags: [Auth]
      summary: Cerrar sesion
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
  /2fa/setup:
    get:
      tags: [Auth]
      summary: Obtener datos para configurar 2FA
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
  /2fa/confirm:
    post:
      tags: [Auth]
      summary: Confirmar 2FA con codigo TOTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string, example: '123456' }
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
  /2fa/recovery-codes/regenerate:
    post:
      tags: [Auth]
      summary: Regenerar codigos de recuperacion
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
  /me:
    get:
      tags: [Auth]
      summary: Usuario autenticado
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
  /users:
    get:
      tags: [RBAC]
      summary: Listar usuarios del tenant
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
  /rbac/roles:
    get:
      tags: [RBAC]
      summary: Listar roles del tenant
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
    post:
      tags: [RBAC]
      summary: Crear rol personalizado
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleRequest'
      responses:
        '201':
          $ref: '#/components/responses/GenericSuccess'
  /rbac/roles/{roleUid}:
    put:
      tags: [RBAC]
      summary: Actualizar rol personalizado
      parameters:
        - $ref: '#/components/parameters/RoleUidPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleRequest'
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
    delete:
      tags: [RBAC]
      summary: Eliminar rol personalizado
      parameters:
        - $ref: '#/components/parameters/RoleUidPath'
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
  /rbac/permissions:
    get:
      tags: [RBAC]
      summary: Catalogo de permisos
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
  /users/{uid}/access:
    get:
      tags: [RBAC]
      summary: Ver acceso efectivo de un usuario
      parameters:
        - $ref: '#/components/parameters/UidPath'
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
  /users/{uid}/manager:
    post:
      tags: [RBAC]
      summary: Asignar manager a un usuario
      parameters:
        - $ref: '#/components/parameters/UidPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [manager_uid]
              properties:
                manager_uid: { type: string, format: uuid }
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
  /users/{uid}/roles:
    post:
      tags: [RBAC]
      summary: Asignar rol a usuario
      parameters:
        - $ref: '#/components/parameters/UidPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role_uid]
              properties:
                role_uid: { type: string, format: uuid }
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
  /users/{uid}/roles/{roleUid}:
    delete:
      tags: [RBAC]
      summary: Quitar rol a usuario
      parameters:
        - $ref: '#/components/parameters/UidPath'
        - $ref: '#/components/parameters/RoleUidPath'
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
  /users/{uid}/permissions:
    post:
      tags: [RBAC]
      summary: Otorgar permiso directo a usuario
      parameters:
        - $ref: '#/components/parameters/UidPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [permission_uid]
              properties:
                permission_uid: { type: string, format: uuid }
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
  /users/{uid}/permissions/{permissionUid}:
    delete:
      tags: [RBAC]
      summary: Revocar permiso directo a usuario
      parameters:
        - $ref: '#/components/parameters/UidPath'
        - $ref: '#/components/parameters/PermissionUidPath'
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
  /plans:
    get:
      tags: [Plans]
      summary: Listar planes SaaS
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
    post:
      tags: [Plans]
      summary: Crear plan SaaS
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlanRequest'
      responses:
        '201':
          $ref: '#/components/responses/GenericSuccess'
  /accounts:
    get:
      tags: [Accounts]
      summary: Listar cuentas
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
    post:
      tags: [Accounts]
      summary: Crear cuenta
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountRequest'
      responses:
        '201':
          $ref: '#/components/responses/GenericSuccess'
  /accounts/{uid}:
    get:
      tags: [Accounts]
      summary: Ver cuenta
      parameters:
        - $ref: '#/components/parameters/UidPath'
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
    put:
      tags: [Accounts]
      summary: Actualizar cuenta
      parameters:
        - $ref: '#/components/parameters/UidPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountRequest'
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
    delete:
      tags: [Accounts]
      summary: Eliminar cuenta
      parameters:
        - $ref: '#/components/parameters/UidPath'
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
  /accounts/{uid}/owner:
    post:
      tags: [Accounts]
      summary: Asignar propietario de cuenta
      parameters:
        - $ref: '#/components/parameters/UidPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OwnerAssignmentRequest'
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
  /contacts:
    get:
      tags: [Contacts]
      summary: Listar contactos
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
    post:
      tags: [Contacts]
      summary: Crear contacto
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactRequest'
      responses:
        '201':
          $ref: '#/components/responses/GenericSuccess'
  /contacts/{uid}:
    get:
      tags: [Contacts]
      summary: Ver contacto
      parameters:
        - $ref: '#/components/parameters/UidPath'
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
    put:
      tags: [Contacts]
      summary: Actualizar contacto
      parameters:
        - $ref: '#/components/parameters/UidPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactRequest'
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
    delete:
      tags: [Contacts]
      summary: Eliminar contacto
      parameters:
        - $ref: '#/components/parameters/UidPath'
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
  /contacts/{uid}/owner:
    post:
      tags: [Contacts]
      summary: Asignar propietario de contacto
      parameters:
        - $ref: '#/components/parameters/UidPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OwnerAssignmentRequest'
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
  /relations:
    get:
      tags: [Relations]
      summary: Listar relaciones
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
    post:
      tags: [Relations]
      summary: Crear relacion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RelationRequest'
      responses:
        '201':
          $ref: '#/components/responses/GenericSuccess'
  /relations/with-entities:
    get:
      tags: [Relations]
      summary: Listar relaciones incluyendo entidades
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
  /relations/hierarchy/{type}/{uid}:
    get:
      tags: [Relations]
      summary: Obtener jerarquia de relaciones de una entidad
      parameters:
        - $ref: '#/components/parameters/TypePath'
        - $ref: '#/components/parameters/UidPath'
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
  /relations/{type}/{uid}:
    get:
      tags: [Relations]
      summary: Obtener relaciones por entidad
      parameters:
        - $ref: '#/components/parameters/TypePath'
        - $ref: '#/components/parameters/UidPath'
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
  /relations/{uid}:
    delete:
      tags: [Relations]
      summary: Eliminar relacion
      parameters:
        - $ref: '#/components/parameters/UidPath'
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
  /crm-entities:
    get:
      tags: [CrmEntities]
      summary: Listar entidades CRM
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
    post:
      tags: [CrmEntities]
      summary: Crear entidad CRM
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CrmEntityRequest'
      responses:
        '201':
          $ref: '#/components/responses/GenericSuccess'
  /crm-entities/{uid}/owner:
    post:
      tags: [CrmEntities]
      summary: Asignar propietario a entidad CRM
      parameters:
        - $ref: '#/components/parameters/UidPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OwnerAssignmentRequest'
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
  /tags:
    get:
      tags: [Tags]
      summary: Listar tags
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
    post:
      tags: [Tags]
      summary: Crear tag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagRequest'
      responses:
        '201':
          $ref: '#/components/responses/GenericSuccess'
  /tags/{uid}:
    put:
      tags: [Tags]
      summary: Actualizar tag
      parameters:
        - $ref: '#/components/parameters/UidPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagRequest'
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
    delete:
      tags: [Tags]
      summary: Eliminar tag
      parameters:
        - $ref: '#/components/parameters/UidPath'
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
  /tags/assign:
    post:
      tags: [Tags]
      summary: Asignar tag a entidad
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagAssignmentRequest'
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
    delete:
      tags: [Tags]
      summary: Desasignar tag a entidad via DELETE
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagAssignmentRequest'
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
  /tags/unassign:
    post:
      tags: [Tags]
      summary: Desasignar tag a entidad
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagAssignmentRequest'
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
  /tasks:
    get:
      tags: [Tasks]
      summary: Listar tareas
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
    post:
      tags: [Tasks]
      summary: Crear tarea
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskRequest'
      responses:
        '201':
          $ref: '#/components/responses/GenericSuccess'
  /tasks/{uid}:
    get:
      tags: [Tasks]
      summary: Ver tarea
      parameters:
        - $ref: '#/components/parameters/UidPath'
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
    put:
      tags: [Tasks]
      summary: Actualizar tarea
      parameters:
        - $ref: '#/components/parameters/UidPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskRequest'
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
    delete:
      tags: [Tasks]
      summary: Eliminar tarea
      parameters:
        - $ref: '#/components/parameters/UidPath'
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
  /interactions/{type}/{uid}:
    get:
      tags: [Interactions]
      summary: Timeline de interacciones por entidad
      parameters:
        - $ref: '#/components/parameters/TypePath'
        - $ref: '#/components/parameters/UidPath'
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
  /interactions/notes:
    post:
      tags: [Interactions]
      summary: Registrar nota
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InteractionRequest'
      responses:
        '201':
          $ref: '#/components/responses/GenericSuccess'
  /interactions/calls:
    post:
      tags: [Interactions]
      summary: Registrar llamada
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InteractionRequest'
      responses:
        '201':
          $ref: '#/components/responses/GenericSuccess'
  /interactions/emails:
    post:
      tags: [Interactions]
      summary: Registrar correo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InteractionRequest'
      responses:
        '201':
          $ref: '#/components/responses/GenericSuccess'
  /activities:
    get:
      tags: [Activities]
      summary: Listar actividades
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
    post:
      tags: [Activities]
      summary: Crear actividad
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivityRequest'
      responses:
        '201':
          $ref: '#/components/responses/GenericSuccess'
  /activities/range:
    get:
      tags: [Activities]
      summary: Consultar actividades por rango
      parameters:
        - in: query
          name: start_date
          schema: { type: string, format: date }
        - in: query
          name: end_date
          schema: { type: string, format: date }
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
  /activities/{uid}:
    get:
      tags: [Activities]
      summary: Ver actividad
      parameters:
        - $ref: '#/components/parameters/UidPath'
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
    put:
      tags: [Activities]
      summary: Actualizar actividad
      parameters:
        - $ref: '#/components/parameters/UidPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivityRequest'
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
    delete:
      tags: [Activities]
      summary: Eliminar actividad
      parameters:
        - $ref: '#/components/parameters/UidPath'
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
  /documents/entity/{type}/{uid}:
    get:
      tags: [Documents]
      summary: Listar documentos por entidad
      parameters:
        - $ref: '#/components/parameters/TypePath'
        - $ref: '#/components/parameters/UidPath'
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
  /documents/download/{uid}:
    get:
      tags: [Documents]
      summary: Descargar documento
      parameters:
        - $ref: '#/components/parameters/UidPath'
      responses:
        '200':
          description: Archivo binario
          content:
            application/pdf:
              schema:
                type: string
                format: binary
  /documents:
    post:
      tags: [Documents]
      summary: Subir documento PDF
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [entity_type, entity_uid, file]
              properties:
                entity_type: { type: string }
                entity_uid: { type: string, format: uuid }
                file: { type: string, format: binary }
      responses:
        '201':
          $ref: '#/components/responses/GenericSuccess'
  /inventory/master:
    get:
      tags: [Inventory]
      summary: Maestro de inventario
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
  /inventory/availability:
    get:
      tags: [Inventory]
      summary: Disponibilidad de inventario
      parameters:
        - in: query
          name: product_uid
          schema: { type: string, format: uuid }
        - in: query
          name: warehouse_uid
          schema: { type: string, format: uuid }
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
  /inventory/movements:
    get:
      tags: [Inventory]
      summary: Historial de movimientos
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
  /inventory/stocks/adjust:
    post:
      tags: [Inventory]
      summary: Ajustar stock
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InventoryAdjustRequest'
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
  /inventory/reservations:
    post:
      tags: [Inventory]
      summary: Crear reserva de stock
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InventoryReservationRequest'
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
  /inventory/reservations/source/{sourceType}/{sourceUid}:
    get:
      tags: [Inventory]
      summary: Consultar reservas por referencia
      parameters:
        - $ref: '#/components/parameters/SourceTypePath'
        - $ref: '#/components/parameters/SourceUidPath'
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
  /inventory/reservations/{uid}:
    delete:
      tags: [Inventory]
      summary: Liberar reserva
      parameters:
        - $ref: '#/components/parameters/UidPath'
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
  /inventory/reservations/{uid}/consume:
    post:
      tags: [Inventory]
      summary: Consumir reserva
      parameters:
        - $ref: '#/components/parameters/UidPath'
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
  /inventory/movements/transfer:
    post:
      tags: [Inventory]
      summary: Transferir stock entre bodegas
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InventoryTransferRequest'
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
  /inventory/report:
    get:
      tags: [Inventory]
      summary: Reporte comercial de inventario
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
  /inventory/report/export:
    get:
      tags: [Inventory]
      summary: Exportar reporte de inventario
      responses:
        '200':
          description: Archivo CSV
          content:
            text/csv:
              schema:
                type: string
  /inventory/categories:
    get:
      tags: [Inventory]
      summary: Listar categorias de inventario
      responses:
        '200':
          $ref: '#/components/responses/GenericSuccess'
    post:
      tags: [Inventory]
      summary: Crear categoria de inventario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NameColorRequest'
      responses:
        '201':
          $ref: '#/components/responses/GenericSuccess'
  /inventory/categories/{uid}:
    put:
      tags: [Inventory]
      summary: Actualizar categoria de inventario
      parameters:
        - $ref: '#/components/parameters/UidPath'
      requestBody:
