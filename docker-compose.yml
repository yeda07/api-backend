services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: vende-mas-api:latest
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - app_storage:/var/www/html/storage
      - app_cache:/var/www/html/bootstrap/cache
    networks:
      - app-internal
      - traefik-proxy

  queue:
    image: vende-mas-api:latest
    restart: unless-stopped
    env_file:
      - .env
    command: php artisan queue:work redis --sleep=3 --tries=3 --timeout=120
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - app_storage:/var/www/html/storage
      - app_cache:/var/www/html/bootstrap/cache
    networks:
      - app-internal

  scheduler:
    image: vende-mas-api:latest
    restart: unless-stopped
    env_file:
      - .env
    command: sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - app_storage:/var/www/html/storage
      - app_cache:/var/www/html/bootstrap/cache
    networks:
      - app-internal

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-vende_mas}
      POSTGRES_USER: ${DB_USERNAME:-vende_mas}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-vende_mas} -d ${DB_DATABASE:-vende_mas}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - app-internal

volumes:
  app_storage:
  app_cache:
  postgres_data:
  redis_data:

networks:
  app-internal:
    driver: bridge

  traefik-proxy:
    external: true
    name: traefik-proxy
