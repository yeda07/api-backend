services:
  - type: web
    name: api-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /up
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        sync: false
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: api-backend-db
          property: connectionString
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info
      - key: SESSION_DRIVER
        value: file
      - key: REDIS_CLIENT
        value: phpredis
      - key: REDIS_URL
        sync: false
      - key: CACHE_STORE
        value: redis
      - key: QUEUE_CONNECTION
        value: redis
      - key: API_FORCE_INDEX_PAGINATION
        value: "true"
      - key: API_DEFAULT_PER_PAGE
        value: "25"
      - key: API_MAX_PER_PAGE
        value: "100"
      - key: API_RATE_LIMIT_PER_MINUTE
        value: "240"
      - key: API_GUEST_RATE_LIMIT_PER_MINUTE
        value: "60"
      - key: DASHBOARD_CACHE_STORE
        value: redis
      - key: REDIS_QUEUE_CONNECTION
        value: default
      - key: REDIS_CACHE_CONNECTION
        value: cache
      - key: FILESYSTEM_DISK
        value: local
      - key: DOCUMENTS_DISK
        value: documents
      - key: DOCUMENTS_ROOT
        value: /app/storage/app/documents
      - key: MAIL_MAILER
        value: log

databases:
  - name: api-backend-db
